<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ermak X — Тест Drive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { font-size: 24px; margin-bottom: 4px; color: #7b2ffc; }
        .sub { color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 20px; }
        
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 14px;
        }
        .card h3 { font-size: 14px; margin-bottom: 10px; color: rgba(255,255,255,0.5); font-weight: 400; letter-spacing: 0.5px; }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-right: 6px;
            margin-bottom: 6px;
        }
        .btn:active { opacity: 0.7; }
        .btn-google { background: #ea4335; color: white; }
        .btn-yandex { background: #fc3f1d; color: white; }
        .btn-success { background: #22c55e; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-secondary { background: rgba(255,255,255,0.08); color: white; }
        
        input, textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: white;
            font-size: 13px;
            margin-bottom: 8px;
            font-family: inherit;
        }
        textarea { min-height: 70px; resize: vertical; }
        input:focus, textarea:focus { outline: none; border-color: #7b2ffc; }
        
        .flex { display: flex; gap: 6px; flex-wrap: wrap; }
        .status {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 12px 14px;
            margin-top: 12px;
            font-size: 13px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 250px;
            overflow-y: auto;
            border-left: 3px solid #3b82f6;
        }
        .status.success { border-left-color: #22c55e; }
        .status.error { border-left-color: #ef4444; }
        .status.info { border-left-color: #3b82f6; }
        
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge.google { background: #ea4335; color: white; }
        .badge.yandex { background: #fc3f1d; color: white; }
        .badge.none { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); }
        
        .token-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .token-chip {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .token-chip .label { color: rgba(255,255,255,0.4); }
        .token-chip .value { color: rgba(255,255,255,0.7); }
        .token-chip.active { border-color: #22c55e; }
        .token-chip.inactive { opacity: 0.4; }
        
        .user-line {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-top: 4px;
        }
        .user-line .provider { font-weight: 600; }
        .user-line .provider.google { color: #ea4335; }
        .user-line .provider.yandex { color: #fc3f1d; }
        .user-line .email { color: rgba(255,255,255,0.35); font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Тест Drive</h1>
        <div class="sub">Google Drive + Яндекс — два токена</div>

        <!-- Статус -->
        <div class="card">
            <h3>🔑 Токены</h3>
            <div id="authStatus">⏳ Загрузка...</div>
            <div class="token-row" id="tokenRow"></div>
        </div>

        <!-- Пользователи -->
        <div class="card" id="userCard" style="display:none;">
            <h3>👤 Пользователи</h3>
            <div id="userInfo"></div>
        </div>

        <!-- Кнопки входа -->
        <div class="flex">
            <button class="btn btn-google" id="loginGoogleBtn">🔑 Войти через Google</button>
            <button class="btn btn-yandex" id="loginYandexBtn">🔑 Войти через Яндекс</button>
        </div>

        <!-- Создание файла -->
        <div class="card">
            <h3>📄 Создать файл в Google Drive</h3>
            <input type="text" id="fileName" placeholder="Имя файла (например: test.txt)" value="test.txt">
            <textarea id="fileContent" placeholder="Содержимое файла">Привет! Это тестовый файл из Ermak X.</textarea>
            <button class="btn btn-success" id="createFileBtn">📁 Создать</button>
            <div id="fileStatus" class="status info">Ожидание...</div>
        </div>

        <!-- Кнопки -->
        <div class="flex">
            <button class="btn btn-secondary" id="refreshBtn">🔄 Обновить</button>
            <button class="btn btn-danger" id="logoutBtn">🚪 Выйти из всех</button>
        </div>

        <div style="margin-top:20px; font-size:11px; color:rgba(255,255,255,0.15);">
            © ErmakArtekovec 2026
        </div>
    </div>

    <script>
        // ============================================================
        //  КОНФИГУРАЦИЯ
        // ============================================================
        const CONFIG = {
            google: {
                clientId: '333855238553-aar683rv2uu739o3droba2h510i2o4vb.apps.googleusercontent.com',
                redirectUri: 'https://eai-by-ermak.github.io/oauth-callback/'
            },
            yandex: {
                clientId: '51c6313a58e74e40a562933c1556f2b5',
                redirectUri: 'https://eai-by-ermak.github.io/oauth-callback/'
            }
        };

        // ============================================================
        //  DOM
        // ============================================================
        const authStatus = document.getElementById('authStatus');
        const tokenRow = document.getElementById('tokenRow');
        const userCard = document.getElementById('userCard');
        const userInfo = document.getElementById('userInfo');
        const fileStatus = document.getElementById('fileStatus');
        const createFileBtn = document.getElementById('createFileBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginGoogleBtn = document.getElementById('loginGoogleBtn');
        const loginYandexBtn = document.getElementById('loginYandexBtn');

        // ============================================================
        //  УТИЛИТЫ
        // ============================================================
        function log(msg, type = 'info') {
            const el = document.getElementById('fileStatus');
            el.className = `status ${type}`;
            el.textContent = msg;
        }

        function getToken(provider) {
            const key = provider === 'google' ? 'google_token' : 'yandex_token';
            return localStorage.getItem(key);
        }

        function getUser(provider) {
            const key = provider === 'google' ? 'google_user' : 'yandex_user';
            try { return JSON.parse(localStorage.getItem(key) || '{}'); } catch { return {}; }
        }

        function getActiveProviders() {
            const providers = [];
            if (getToken('google')) providers.push('google');
            if (getToken('yandex')) providers.push('yandex');
            return providers;
        }

        // ============================================================
        //  ОТОБРАЖЕНИЕ СТАТУСА
        // ============================================================
        function updateAuthStatus() {
            const providers = getActiveProviders();
            const googleUser = getUser('google');
            const yandexUser = getUser('yandex');

            // --- Общий статус ---
            if (providers.length === 0) {
                authStatus.innerHTML = `<span class="badge none">Нет авторизации</span>`;
            } else {
                authStatus.innerHTML = providers.map(p =>
                    `<span class="badge ${p}">${p === 'google' ? 'Google' : 'Яндекс'}</span>`
                ).join(' ');
            }

            // --- Токены ---
            tokenRow.innerHTML = `
                <div class="token-chip ${getToken('google') ? 'active' : 'inactive'}">
                    <span class="label">Google:</span>
                    <span class="value">${getToken('google') ? '✅ есть' : '❌ нет'}</span>
                </div>
                <div class="token-chip ${getToken('yandex') ? 'active' : 'inactive'}">
                    <span class="label">Яндекс:</span>
                    <span class="value">${getToken('yandex') ? '✅ есть' : '❌ нет'}</span>
                </div>
            `;

            // --- Пользователи ---
            let html = '';
            if (googleUser.name) {
                html += `<div class="user-line"><span class="provider google">Google:</span> ${googleUser.name} <span class="email">${googleUser.email || ''}</span></div>`;
            }
            if (yandexUser.display_name || yandexUser.real_name) {
                const name = yandexUser.display_name || yandexUser.real_name || 'Пользователь';
                html += `<div class="user-line"><span class="provider yandex">Яндекс:</span> ${name} <span class="email">${yandexUser.default_email || ''}</span></div>`;
            }
            if (html) {
                userCard.style.display = 'block';
                userInfo.innerHTML = html;
            } else {
                userCard.style.display = 'none';
            }
        }

        // ============================================================
        //  ВХОД
        // ============================================================
        function loginGoogle() {
            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
                `client_id=${CONFIG.google.clientId}` +
                `&redirect_uri=${CONFIG.google.redirectUri}` +
                `&response_type=token` +
                `&scope=https://www.googleapis.com/auth/drive.file`;

            window.open(authUrl, '_blank');
        }

        function loginYandex() {
            const authUrl = `https://oauth.yandex.ru/authorize?` +
                `client_id=${CONFIG.yandex.clientId}` +
                `&response_type=code` +
                `&redirect_uri=${CONFIG.yandex.redirectUri}`;

            window.open(authUrl, '_blank');
        }

        // ============================================================
        //  СОЗДАНИЕ ФАЙЛА В GOOGLE DRIVE
        // ============================================================
        function createFileInDrive() {
            const token = getToken('google');
            if (!token) {
                log('❌ Нет Google-токена. Войдите через Google.', 'error');
                return;
            }

            const fileName = document.getElementById('fileName').value.trim();
            const content = document.getElementById('fileContent').value;

            if (!fileName) {
                log('❌ Введите имя файла', 'error');
                return;
            }

            log('⏳ Работаем с Google Drive...', 'info');

            // 1. Найти или создать папку Ermak X
            fetch('https://www.googleapis.com/drive/v3/files?q=name="Ermak X" and mimeType="application/vnd.google-apps.folder" and trashed=false', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => {
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            })
            .then(data => {
                let folderId = null;
                if (data.files && data.files.length > 0) {
                    folderId = data.files[0].id;
                    log('✅ Папка Ermak X найдена', 'success');
                } else {
                    return fetch('https://www.googleapis.com/drive/v3/files', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            name: 'Ermak X',
                            mimeType: 'application/vnd.google-apps.folder'
                        })
                    })
                    .then(res => {
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return res.json();
                    })
                    .then(folderData => {
                        if (folderData.error) throw new Error(folderData.error.message);
                        folderId = folderData.id;
                        log('✅ Папка Ermak X создана', 'success');
                        return folderId;
                    });
                }
                return folderId;
            })
            .then(folderId => {
                if (!folderId) {
                    log('❌ Не удалось создать папку', 'error');
                    return;
                }

                log('⏳ Создаём файл...', 'info');

                // 2. Создаём файл внутри папки
                return fetch('https://www.googleapis.com/drive/v3/files', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: fileName,
                        parents: [folderId]
                    })
                })
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                })
                .then(fileData => {
                    if (fileData.error) throw new Error(fileData.error.message);
                    const fileId = fileData.id;

                    // 3. Записываем содержимое
                    return fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'text/plain'
                        },
                        body: content
                    });
                });
            })
            .then(() => {
                log(`✅ Файл "${fileName}" успешно создан в папке Ermak X!`, 'success');
            })
            .catch(err => {
                log(`❌ Ошибка: ${err.message}`, 'error');
            });
        }

        // ============================================================
        //  ВЫХОД
        // ============================================================
        function logoutAll() {
            localStorage.removeItem('google_token');
            localStorage.removeItem('google_user');
            localStorage.removeItem('yandex_token');
            localStorage.removeItem('yandex_user');
            updateAuthStatus();
            log('👋 Вы вышли из всех аккаунтов', 'info');
        }

        // ============================================================
        //  ПРОВЕРКА ВОЗВРАТА С АВТОРИЗАЦИИ (АВТОМАТИЧЕСКАЯ)
        // ============================================================
        function checkCallback() {
            const hash = window.location.hash;
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const tokenFromUrl = params.get('token');

            // Если токен пришёл в URL (от oauth-callback)
            if (tokenFromUrl) {
                localStorage.setItem('google_token', tokenFromUrl);
                log('✅ Google токен получен!', 'success');
                // Убираем токен из URL
                window.history.replaceState(null, null, window.location.pathname);
                updateAuthStatus();
                return;
            }

            if (hash && hash.includes('access_token')) {
                const hashParams = new URLSearchParams(hash.substring(1));
                const token = hashParams.get('access_token');
                if (token) {
                    localStorage.setItem('google_token', token);
                    log('✅ Google токен получен!', 'success');
                    window.history.replaceState(null, null, window.location.pathname);
                    updateAuthStatus();
                }
            }

            if (code) {
                // Яндекс: обмениваем код на токен
                fetch('https://oauth.yandex.ru/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: code,
                        client_id: CONFIG.yandex.clientId,
                        client_secret: 'd74265a56cbe4362a0e200a60fb5588a',
                        redirect_uri: CONFIG.yandex.redirectUri
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.access_token) {
                        localStorage.setItem('yandex_token', data.access_token);
                        log('✅ Яндекс токен получен!', 'success');
                        window.history.replaceState(null, null, window.location.pathname);
                        updateAuthStatus();
                    } else {
                        log('❌ Ошибка получения Яндекс токена', 'error');
                    }
                })
                .catch(err => {
                    log('❌ Ошибка: ' + err.message, 'error');
                });
            }
        }

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        createFileBtn.addEventListener('click', createFileInDrive);
        refreshBtn.addEventListener('click', updateAuthStatus);
        logoutBtn.addEventListener('click', logoutAll);
        loginGoogleBtn.addEventListener('click', loginGoogle);
        loginYandexBtn.addEventListener('click', loginYandex);

        // Первичная загрузка
        updateAuthStatus();

        // Автоматическая проверка возврата с авторизации
        checkCallback();

        // Дополнительная проверка при фокусе окна (если вернулись из вкладки)
        window.addEventListener('focus', function() {
            checkCallback();
            updateAuthStatus();
        });

        console.log('🧪 Тестовый HTML загружен');
        console.log('Google токен:', localStorage.getItem('google_token'));
        console.log('Яндекс токен:', localStorage.getItem('yandex_token'));
    </script>
</body>
</html>
