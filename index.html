<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#030617">
    <title>Ermak X</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            transition: background-color 0.2s;
        }

        /* ТЕМЫ - ОРИГИНАЛЬНЫЕ ЦВЕТА */
        body.theme-dark {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --glass-bg: rgba(30, 30, 35, 0.85);
            --glass-border: rgba(255, 255, 255, 0.25);
            --shadow: rgba(0, 0, 0, 0.6);
            --accent: #0a84ff;
            --time-bg: rgba(0, 0, 0, 0.6);
            --nav-icon-color: #ffffff;
            --home-bg: url('home_bg_dark.png');
        }

        body.theme-light {
            --bg-color: #f5f5f7;
            --text-primary: #1c1c1e;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.15);
            --shadow: rgba(0, 0, 0, 0.1);
            --accent: #007aff;
            --time-bg: rgba(0, 0, 0, 0.08);
            --nav-icon-color: #1c1c1e;
            --home-bg: url('home_bg.png');
        }

        /* ===== МЕДЛЕННАЯ КРУГОВАЯ АНИМАЦИЯ КОНТУРА ===== */
        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes borderSpin {
            0% { --angle: 0deg; }
            100% { --angle: 360deg; }
        }

        /* Анимация переливания названия */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-title {
            font-size: 52px;
            font-weight: 800;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #ff6b6b);
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 4s ease infinite;
            margin-bottom: 20px;
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР */
        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
            background-size: cover;
            background-position: center;
            transition: background-image 0.2s, background-color 0.2s;
        }

        /* Экраны */
        .screen {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            opacity: 0;
            visibility: hidden;
            display: none;
        }
        .screen.active {
            opacity: 1;
            visibility: visible;
            display: block;
        }

        /* ========== ДОМ ========== */
        .home-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            padding: 40px 24px 80px 24px;
            gap: 16px;
        }

        /* Контейнер логотипа */
        .logo-container {
            perspective: 800px;
            width: 140px;
            height: 140px;
            margin-bottom: 30px;
            border-radius: 28px;
            position: relative;
        }

        .logo-container::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            padding: 2px;
            background: conic-gradient(
                from var(--angle, 0deg),
                transparent 0%,
                #7b2ffc 12%,
                #a855f7 25%,
                #c084fc 35%,
                #a855f7 45%,
                #7b2ffc 55%,
                transparent 70%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderSpin 6s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .logo-flipper {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-style: preserve-3d;
            cursor: pointer;
            animation: gentleFloat 3s ease-in-out infinite;
            border-radius: 28px;
            z-index: 1;
        }
        .logo-flipper.flipped {
            transform: rotateY(180deg);
            animation: none;
        }
        .logo-front, .logo-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 28px;
            overflow: hidden;
        }
        .logo-front {
            transform: rotateY(0deg);
        }
        .logo-back {
            transform: rotateY(180deg);
            background: var(--time-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px var(--shadow);
        }
        .logo-back span {
            font-size: 48px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: monospace;
        }
        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 28px;
            filter: drop-shadow(0 8px 20px var(--shadow));
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .time {
            font-size: 72px;
            font-weight: 700;
            background: var(--time-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 8px 24px;
            border-radius: 60px;
            color: var(--text-primary);
            letter-spacing: 4px;
            font-variant-numeric: tabular-nums;
            box-shadow: 0 4px 16px var(--shadow);
            position: relative;
        }

        .time::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 62px;
            padding: 2px;
            background: conic-gradient(
                from var(--angle, 0deg),
                transparent 0%,
                #7b2ffc 12%,
                #a855f7 25%,
                #c084fc 35%,
                #a855f7 45%,
                #7b2ffc 55%,
                transparent 70%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderSpin 6s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .date-box {
            background: var(--time-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 12px 24px;
            border-radius: 28px;
            font-size: 20px;
            font-weight: 500;
            color: var(--text-primary);
            box-shadow: 0 4px 16px var(--shadow);
            position: relative;
        }

        .date-box::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            padding: 2px;
            background: conic-gradient(
                from var(--angle, 0deg),
                transparent 0%,
                #7b2ffc 12%,
                #a855f7 25%,
                #c084fc 35%,
                #a855f7 45%,
                #7b2ffc 55%,
                transparent 70%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderSpin 6s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        /* ========== СЕРВИСЫ ========== */
        .services-content {
            padding: 24px 20px;
        }
        .services-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
            color: var(--text-primary);
        }

        .service-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: transform 0.1s;
            color: var(--text-primary);
            position: relative;
        }

        .service-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            padding: 2px;
            background: conic-gradient(
                from var(--angle, 0deg),
                transparent 0%,
                #7b2ffc 12%,
                #a855f7 25%,
                #c084fc 35%,
                #a855f7 45%,
                #7b2ffc 55%,
                transparent 70%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderSpin 6s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .service-card > * {
            position: relative;
            z-index: 1;
        }

        .service-card:active { transform: scale(0.98); }
        .service-icon { font-size: 40px; }
        .service-info { flex: 1; }
        .service-name { font-size: 18px; font-weight: 600; }
        .service-desc { font-size: 13px; opacity: 0.7; margin-top: 4px; }

        /* ========== НАСТРОЙКИ ========== */
        .settings-content {
            padding: 24px 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }
        .settings-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
            color: var(--text-primary);
        }

        .setting-item {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 16px 20px;
            margin-bottom: 16px;
            color: var(--text-primary);
            width: 100%;
            position: relative;
        }

        .setting-item::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            padding: 2px;
            background: conic-gradient(
                from var(--angle, 0deg),
                transparent 0%,
                #7b2ffc 12%,
                #a855f7 25%,
                #c084fc 35%,
                #a855f7 45%,
                #7b2ffc 55%,
                transparent 70%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderSpin 6s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .setting-item > * {
            position: relative;
            z-index: 1;
        }

        .setting-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: 500;
            flex-wrap: wrap;
            gap: 8px;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            background: rgba(255,255,255,0.15);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            font-size: 16px;
        }
        select option {
            background: #1c1c1e;
            color: white;
        }

        .toggle-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
            flex-shrink: 0;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            border-radius: 34px;
            transition: 0.2s;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.2s;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(26px); }

        .policy-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 40px;
            text-align: center;
            cursor: pointer;
            margin-top: 20px;
            color: var(--text-primary);
            width: 100%;
            position: relative;
        }

        .policy-btn::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 42px;
            padding: 2px;
            background: conic-gradient(
                from var(--angle, 0deg),
                transparent 0%,
                #7b2ffc 12%,
                #a855f7 25%,
                #c084fc 35%,
                #a855f7 45%,
                #7b2ffc 55%,
                transparent 70%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderSpin 6s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .policy-btn > * {
            position: relative;
            z-index: 1;
        }

        .btn-clear {
            background: rgba(255, 69, 58, 0.8);
            margin-top: 16px;
            text-align: center;
            padding: 14px;
            border-radius: 40px;
            cursor: pointer;
            color: white;
            width: 100%;
            position: relative;
        }

        .btn-clear::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 42px;
            padding: 2px;
            background: conic-gradient(
                from var(--angle, 0deg),
                transparent 0%,
                #7b2ffc 12%,
                #a855f7 25%,
                #c084fc 35%,
                #a855f7 45%,
                #7b2ffc 55%,
                transparent 70%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderSpin 6s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .btn-clear > * {
            position: relative;
            z-index: 1;
        }

        .policy-btn:active, .btn-clear:active { opacity: 0.7; }

        /* ========== НИЖНЯЯ ПАНЕЛЬ ========== */
        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px 20px;
            background: transparent;
        }

        .nav-group {
            display: flex;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: 80px;
            padding: 6px 16px;
            gap: 16px;
            box-shadow: 0 4px 16px var(--shadow);
            position: relative;
        }

        .nav-group::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 82px;
            padding: 2px;
            background: conic-gradient(
                from var(--angle, 0deg),
                transparent 0%,
                #7b2ffc 12%,
                #a855f7 25%,
                #c084fc 35%,
                #a855f7 45%,
                #7b2ffc 55%,
                transparent 70%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderSpin 6s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .nav-group > * {
            position: relative;
            z-index: 1;
        }

        .nav-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 20px;
            border-radius: 60px;
            transition: 0.1s;
            color: var(--nav-icon-color);
            opacity: 0.7;
            min-width: 70px;
        }
        .nav-btn.active {
            opacity: 1;
            background: rgba(255,255,255,0.15);
        }
        .nav-btn:active { transform: scale(0.95); }
        .nav-icon { font-size: 22px; }
        .nav-label { font-size: 11px; font-weight: 500; }
        .nav-btn.home-btn .nav-icon { font-size: 28px; }

        /* ========== МОДАЛКА ПОЛИТИКИ (ИСПРАВЛЕНА) ========== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            padding: 20px;
        }
        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        /* Обводка всей модалки, а не внутреннего контента */
        .modal-wrapper {
            padding: 3px;
            border-radius: 50px;
            background: conic-gradient(
                from var(--angle, 0deg),
                transparent 0%,
                #7b2ffc 12%,
                #a855f7 25%,
                #c084fc 35%,
                #a855f7 45%,
                #7b2ffc 55%,
                transparent 70%
            );
            background-size: 300% 300%;
            animation: borderSpin 6s linear infinite;
            max-width: 400px;
            width: 85%;
            max-height: 80vh;
        }

        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border-radius: 48px;
            padding: 24px;
            overflow-y: auto;
            color: var(--text-primary);
            max-height: 80vh;
        }

        .modal-content h3 {
            font-size: 22px;
            margin-bottom: 16px;
            text-align: center;
        }

        .modal-content .policy-text {
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-line;
        }

        .modal-close {
            display: block;
            margin: 20px auto 0;
            background: var(--accent);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
        .modal-close:active { opacity: 0.7; }

        /* ========== АДАПТИВ ========== */
        @media (min-width: 768px) {
            .settings-content {
                max-width: 700px;
                padding: 30px 40px;
            }
            .setting-item {
                padding: 20px 28px;
            }
            .settings-title {
                font-size: 34px;
                margin-bottom: 36px;
            }
            .setting-label {
                font-size: 18px;
            }
            select, input[type="range"] {
                padding: 14px 20px;
                font-size: 18px;
            }
        }

        @media (min-width: 1024px) {
            .settings-content {
                max-width: 800px;
                padding: 40px 60px;
            }
            .setting-item {
                padding: 24px 32px;
                margin-bottom: 20px;
            }
            .settings-title {
                font-size: 40px;
                margin-bottom: 40px;
            }
            .setting-label {
                font-size: 20px;
            }
            select, input[type="range"] {
                padding: 16px 24px;
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .settings-content {
                padding: 16px 12px;
            }
            .setting-item {
                padding: 14px 16px;
            }
            .settings-title {
                font-size: 24px;
                margin-bottom: 24px;
            }
            .setting-label {
                font-size: 14px;
            }
            select, input[type="range"] {
                padding: 10px 14px;
                font-size: 14px;
            }
            .time {
                font-size: 48px;
            }
            .animated-title {
                font-size: 36px;
            }
            .logo-container {
                width: 110px;
                height: 110px;
            }
            .modal-wrapper {
                width: 92%;
            }
            .modal-content {
                padding: 18px;
            }
            .modal-content .policy-text {
                font-size: 13px;
            }
        }
    </style>
</head>
<body class="theme-dark">
<div class="app-container" id="appContainer">
    <!-- ДОМ -->
    <div id="homeScreen" class="screen home-screen active">
        <div class="home-content">
            <div class="logo-container">
                <div class="logo-flipper" id="logoFlipper">
                    <div class="logo-front">
                        <img class="logo-img" src="logo.jpg" alt="Ermak X" id="mainLogo">
                    </div>
                    <div class="logo-back" id="logoBack">
                        <span id="randomNumberSpan">0</span>
                    </div>
                </div>
            </div>
            <div class="animated-title">Ermak X</div>
            <div id="timeDisplay" class="time">--:--</div>
            <div id="dateDisplay" class="date-box">--</div>
        </div>
    </div>

    <!-- СЕРВИСЫ -->
    <div id="servicesScreen" class="screen">
        <div class="services-content">
            <div class="services-title">Сервисы</div>
            <div class="service-card" id="aiServiceBtn">
                <div class="service-icon">AI</div>
                <div class="service-info">
                    <div class="service-name">Ассистент</div>
                    <div class="service-desc">Искусственный интеллект</div>
                </div>
                <div>→</div>
            </div>
            <div class="service-card" id="game4096Btn">
                <div class="service-icon">🎮</div>
                <div class="service-info">
                    <div class="service-name">4096</div>
                    <div class="service-desc">Головоломка с числами</div>
                </div>
                <div>→</div>
            </div>
            <div class="service-card" id="mediaPlayerBtn">
                <div class="service-icon">🎵</div>
                <div class="service-info">
                    <div class="service-name">Медиаплеер</div>
                    <div class="service-desc">Воспроизведение музыки</div>
                </div>
                <div>→</div>
            </div>
        </div>
    </div>

    <!-- НАСТРОЙКИ -->
    <div id="settingsScreen" class="screen">
        <div class="settings-content">
            <div class="settings-title">Настройки</div>
            <div class="setting-item">
                <div class="setting-label">Тема</div>
                <select id="themeSelect">
                    <option value="system">Системная</option>
                    <option value="light">Светлая</option>
                    <option value="dark">Тёмная</option>
                </select>
            </div>
            <div class="setting-item">
                <div class="setting-label">Громкость звука печати (<span id="volumeVal">100</span>%)</div>
                <input type="range" id="volumeSlider" min="0" max="100" value="100">
            </div>
            <div class="setting-item">
                <div class="toggle-group">
                    <span>Звук печати</span>
                    <label class="toggle-switch"><input type="checkbox" id="typingSoundToggle" checked><span class="slider"></span></label>
                </div>
            </div>
            <div class="setting-item">
                <div class="setting-label">Контекст ИИ (<span id="contextVal">5</span>)</div>
                <input type="range" id="contextSlider" min="0" max="10" step="1" value="5">
            </div>
            <div class="policy-btn" id="showPolicyBtn">Политика конфиденциальности</div>
            <div class="btn-clear" id="clearChatBtn">Очистить чат ИИ</div>
        </div>
    </div>

    <!-- Нижняя панель -->
    <div class="bottom-bar">
        <div class="nav-group">
            <button class="nav-btn" id="servicesNavBtn">
                <div class="nav-icon">◧</div>
                <div class="nav-label">Сервисы</div>
            </button>
            <button class="nav-btn home-btn" id="homeNavBtn">
                <div class="nav-icon">⌂</div>
                <div class="nav-label">Дом</div>
            </button>
            <button class="nav-btn" id="settingsNavBtn">
                <div class="nav-icon">⚙</div>
                <div class="nav-label">Настройки</div>
            </button>
        </div>
    </div>
</div>

<!-- ===== МОДАЛКА ПОЛИТИКИ (ИСПРАВЛЕНА) ===== -->
<div id="policyModal" class="modal">
    <div class="modal-wrapper">
        <div class="modal-content">
            <h3>Политика конфиденциальности</h3>
            <div id="policyText" class="policy-text"></div>
            <button class="modal-close" id="closePolicyBtn">Закрыть</button>
        </div>
    </div>
</div>

<script src="cordova.js"></script>
<script>
    const POLICY_TEXT = `КОНФИДЕНЦИАЛЬНОСТЬ И БЕЗОПАСНОСТЬ

1. Приложение Ermak X не собирает и не передаёт личные данные пользователя.
2. Вся история переписки с AI хранится исключительно локально на вашем устройстве (localStorage).
3. Настройки приложения (тема, громкость, звуки, контекст) также хранятся только локально.
4. При отправке сообщения AI-ассистенту текст передаётся через защищённое соединение API OpenRouter.
5. Приложение не использует сторонние аналитические сервисы.
6. Приложение не запрашивает доступ к файлам, контактам, геолокации.
7. Приложение не несёт ответственности за содержимое ответов AI-ассистента.

© ErmakArtekovec, 2026`;

    let currentTheme = 'dark';
    let currentVolume = 100;
    let typingSoundEnabled = true;
    let contextCount = 5;
    let flipTimeout = null;
    let isHomeScreen = true;

    const appContainer = document.getElementById('appContainer');
    const homeScreen = document.getElementById('homeScreen');
    const servicesScreen = document.getElementById('servicesScreen');
    const settingsScreen = document.getElementById('settingsScreen');
    const homeNavBtn = document.getElementById('homeNavBtn');
    const servicesNavBtn = document.getElementById('servicesNavBtn');
    const settingsNavBtn = document.getElementById('settingsNavBtn');
    const timeDisplay = document.getElementById('timeDisplay');
    const dateDisplay = document.getElementById('dateDisplay');
    const logoFlipper = document.getElementById('logoFlipper');
    const randomNumberSpan = document.getElementById('randomNumberSpan');

    function setHomeBackground() {
        appContainer.style.backgroundImage = "var(--home-bg)";
        appContainer.style.backgroundColor = "transparent";
    }
    
    function removeHomeBackground() {
        appContainer.style.backgroundImage = "none";
        appContainer.style.backgroundColor = "var(--bg-color)";
    }

    function flipToNumber() {
        if (flipTimeout) clearTimeout(flipTimeout);
        const randomNum = Math.floor(Math.random() * 139) + 1;
        randomNumberSpan.textContent = randomNum;
        logoFlipper.classList.add('flipped');
        flipTimeout = setTimeout(() => {
            logoFlipper.classList.remove('flipped');
            flipTimeout = null;
        }, 5000);
    }

    function flipBackToLogo() {
        if (flipTimeout) {
            clearTimeout(flipTimeout);
            flipTimeout = null;
        }
        logoFlipper.classList.remove('flipped');
    }

    if (logoFlipper) {
        logoFlipper.addEventListener('click', (e) => {
            e.stopPropagation();
            if (logoFlipper.classList.contains('flipped')) {
                flipBackToLogo();
            } else {
                flipToNumber();
            }
        });
    }

    function applyTheme(theme) {
        let resolved = theme;
        if (theme === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.body.classList.remove('theme-light', 'theme-dark');
        document.body.classList.add(`theme-${resolved}`);
        
        if (isHomeScreen) {
            setHomeBackground();
        } else {
            removeHomeBackground();
        }
    }

    function saveSettings() {
        localStorage.setItem('ermakx_settings', JSON.stringify({
            theme: currentTheme, volume: currentVolume,
            typingSound: typingSoundEnabled, context: contextCount
        }));
    }

    function loadSettings() {
        const saved = localStorage.getItem('ermakx_settings');
        if (saved) {
            try {
                const s = JSON.parse(saved);
                currentTheme = s.theme || 'dark';
                currentVolume = s.volume ?? 100;
                typingSoundEnabled = s.typingSound ?? true;
                contextCount = s.context ?? 5;
            } catch(e) {}
        }
        applyTheme(currentTheme);
        document.getElementById('themeSelect').value = currentTheme;
        document.getElementById('volumeSlider').value = currentVolume;
        document.getElementById('volumeVal').innerText = currentVolume;
        document.getElementById('typingSoundToggle').checked = typingSoundEnabled;
        document.getElementById('contextSlider').value = contextCount;
        document.getElementById('contextVal').innerText = contextCount;
    }

    function showScreen(screenId) {
        homeScreen.classList.remove('active');
        servicesScreen.classList.remove('active');
        settingsScreen.classList.remove('active');

        if (screenId === 'home') {
            homeScreen.classList.add('active');
            isHomeScreen = true;
            setHomeBackground();
        }
        if (screenId === 'services') {
            servicesScreen.classList.add('active');
            isHomeScreen = false;
            removeHomeBackground();
        }
        if (screenId === 'settings') {
            settingsScreen.classList.add('active');
            isHomeScreen = false;
            removeHomeBackground();
        }
        localStorage.setItem('lastScreen', screenId);
    }

    homeNavBtn.addEventListener('click', () => showScreen('home'));
    servicesNavBtn.addEventListener('click', () => showScreen('services'));
    settingsNavBtn.addEventListener('click', () => showScreen('settings'));

    function updateTime() {
        const now = new Date();
        timeDisplay.textContent = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        dateDisplay.textContent = now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
    }
    updateTime();
    setInterval(updateTime, 1000);

    // ===== МОДАЛКА ПОЛИТИКИ =====
    const modal = document.getElementById('policyModal');
    const policyText = document.getElementById('policyText');
    const closePolicyBtn = document.getElementById('closePolicyBtn');

    document.getElementById('showPolicyBtn').onclick = () => {
        policyText.innerText = POLICY_TEXT;
        modal.classList.add('active');
    };

    closePolicyBtn.onclick = () => modal.classList.remove('active');
    modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };

    document.getElementById('clearChatBtn').onclick = () => {
        localStorage.removeItem('ermakx_chat');
        alert('Чат ИИ очищен');
    };
    
    document.getElementById('aiServiceBtn').onclick = () => {
        const style = document.createElement('style');
        style.textContent = `html { animation: fadeIn 0.25s ease; } @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }`;
        document.head.appendChild(style);
        setTimeout(() => window.location.href = 'ai.html', 10);
    };

    document.getElementById('game4096Btn').onclick = () => {
        const style = document.createElement('style');
        style.textContent = `html { animation: fadeIn 0.25s ease; } @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }`;
        document.head.appendChild(style);
        setTimeout(() => window.location.href = '4096.html', 10);
    };

    document.getElementById('mediaPlayerBtn').onclick = () => {
        const style = document.createElement('style');
        style.textContent = `html { animation: fadeIn 0.25s ease; } @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }`;
        document.head.appendChild(style);
        setTimeout(() => window.location.href = 'media.html', 10);
    };

    document.getElementById('themeSelect').onchange = (e) => {
        currentTheme = e.target.value;
        applyTheme(currentTheme);
        saveSettings();
    };
    document.getElementById('volumeSlider').oninput = (e) => {
        currentVolume = parseInt(e.target.value);
        document.getElementById('volumeVal').innerText = currentVolume;
        saveSettings();
    };
    document.getElementById('typingSoundToggle').onchange = (e) => {
        typingSoundEnabled = e.target.checked;
        saveSettings();
    };
    document.getElementById('contextSlider').oninput = (e) => {
        contextCount = parseInt(e.target.value);
        document.getElementById('contextVal').innerText = contextCount;
        saveSettings();
    };

    const lastScreen = localStorage.getItem('lastScreen') || 'home';
    showScreen(lastScreen);
    loadSettings();
    window.addEventListener('pageshow', () => showScreen('home'));
</script>
</body>
</html>
