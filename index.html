<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ermak X — Тест Drive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 4px;
            color: #7b2ffc;
        }
        .sub {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 14px;
        }
        .card h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-right: 6px;
            margin-bottom: 6px;
        }
        .btn:active {
            opacity: 0.7;
        }
        .btn-google {
            background: #ea4335;
            color: white;
        }
        .btn-yandex {
            background: #fc3f1d;
            color: white;
        }
        .btn-success {
            background: #22c55e;
            color: white;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }
        .btn-close {
            background: #ff5f5a;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: white;
            font-size: 13px;
            margin-bottom: 8px;
            font-family: inherit;
        }
        textarea {
            min-height: 70px;
            resize: vertical;
        }
        input:focus,
        textarea:focus {
            outline: none;
            border-color: #7b2ffc;
        }

        .flex {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .status {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 12px 14px;
            margin-top: 12px;
            font-size: 13px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 250px;
            overflow-y: auto;
            border-left: 3px solid #3b82f6;
        }
        .status.success {
            border-left-color: #22c55e;
        }
        .status.error {
            border-left-color: #ef4444;
        }
        .status.info {
            border-left-color: #3b82f6;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge.google {
            background: #ea4335;
            color: white;
        }
        .badge.yandex {
            background: #fc3f1d;
            color: white;
        }
        .badge.none {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.4);
        }

        .token-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .token-chip {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .token-chip .label {
            color: rgba(255, 255, 255, 0.4);
        }
        .token-chip .value {
            color: rgba(255, 255, 255, 0.7);
        }
        .token-chip.active {
            border-color: #22c55e;
        }
        .token-chip.inactive {
            opacity: 0.4;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 4px 12px;
            font-size: 13px;
            margin-top: 8px;
        }
        .data-grid .label {
            color: rgba(255, 255, 255, 0.4);
        }
        .data-grid .value {
            color: rgba(255, 255, 255, 0.8);
            word-break: break-all;
        }

        .tab-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: rgba(123, 47, 252, 0.2);
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* ============================================================
           ВСТРОЕННОЕ ОКНО БРАУЗЕРА С ФИОЛЕТОВОЙ РАМКОЙ
        ============================================================ */
        .browser-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .browser-overlay.active {
            display: flex;
        }

        .browser-window {
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            padding: 3px;
            border-radius: 32px;
            background: conic-gradient(from var(--angle, 0deg), transparent 0%, #7b2ffc 15%, #a855f7 30%, #c084fc 45%, #a855f7 60%, #7b2ffc 75%, transparent 100%);
            background-size: 300% 300%;
            animation: borderSpin 6s linear infinite;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes borderSpin {
            0% {
                --angle: 0deg;
            }
            100% {
                --angle: 360deg;
            }
        }

        .browser-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: rgba(30, 30, 35, 0.95);
            backdrop-filter: blur(20px);
            flex-shrink: 0;
            gap: 12px;
            border-radius: 30px 30px 0 0;
        }
        .browser-header .title {
            flex: 1;
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }
        .browser-header .btn-close {
            background: #ff5f5a;
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .browser-body {
            flex: 1;
            background: #ffffff;
            min-height: 400px;
            position: relative;
        }
        .browser-body iframe {
            width: 100%;
            height: 100%;
            border: none;
            min-height: 400px;
        }

        /* Адаптив для маленьких экранов */
        @media (max-width: 500px) {
            .browser-window {
                max-width: 100%;
                max-height: 95vh;
                border-radius: 24px;
            }
            .browser-header {
                padding: 10px 12px;
                border-radius: 22px 22px 0 0;
            }
            .browser-body {
                min-height: 300px;
            }
            .browser-body iframe {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🧪 Тест Drive</h1>
        <div class="sub">Google — для диска, Яндекс — для данных</div>

        <!-- Статус -->
        <div class="card">
            <h3>🔑 Токены</h3>
            <div id="authStatus">⏳ Загрузка...</div>
            <div class="token-row" id="tokenRow"></div>
        </div>

        <!-- Кнопки входа -->
        <div class="flex">
            <button class="btn btn-google" id="loginGoogleBtn">🔑 Войти через Google</button>
            <button class="btn btn-yandex" id="loginYandexBtn">🔑 Войти через Яндекс</button>
        </div>

        <!-- Вкладки -->
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="google">Google Диск</button>
            <button class="tab-btn" data-tab="yandex">Яндекс Данные</button>
        </div>

        <!-- Google -->
        <div class="tab-content active" id="tab-google">
            <div class="card">
                <h3>📁 Google Drive</h3>
                <div id="googleStatus" style="font-size:13px; color:rgba(255,255,255,0.6);"></div>
                <div style="margin-top:12px;">
                    <input type="text" id="fileName" placeholder="Имя файла" value="test.txt">
                    <textarea id="fileContent" placeholder="Содержимое">Тестовый файл</textarea>
                    <button class="btn btn-success" id="createFileBtn">📁 Создать файл</button>
                    <div id="fileStatus" class="status info">Готово</div>
                </div>
            </div>
        </div>

        <!-- Яндекс -->
        <div class="tab-content" id="tab-yandex">
            <div class="card">
                <h3>👤 Данные пользователя (Яндекс)</h3>
                <div id="yandexUserData">Нет данных. Войдите через Яндекс.</div>
            </div>
        </div>

        <!-- Кнопки -->
        <div class="flex">
            <button class="btn btn-secondary" id="refreshBtn">🔄 Обновить</button>
            <button class="btn btn-danger" id="logoutBtn">🚪 Выйти из всех</button>
        </div>

        <div style="margin-top:20px; font-size:11px; color:rgba(255,255,255,0.15);">
            © ErmakArtekovec 2026
        </div>
    </div>

    <!-- ============================================================
    ВСТРОЕННЫЙ БРАУЗЕР С ФИОЛЕТОВОЙ РАМКОЙ
    ============================================================ -->
    <div class="browser-overlay" id="browserOverlay">
        <div class="browser-window">
            <div class="browser-header">
                <button class="btn-close" id="browserCloseBtn">✕</button>
                <div class="title" id="browserTitle">Авторизация</div>
            </div>
            <div class="browser-body">
                <iframe id="browserIframe"></iframe>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  КОНФИГУРАЦИЯ
        // ============================================================
        const CONFIG = {
            google: {
                clientId: '333855238553-aar683rv2uu739o3droba2h510i2o4vb.apps.googleusercontent.com',
                redirectUri: 'https://eai-by-ermak.github.io/oauth-callback/'
            },
            yandex: {
                clientId: '51c6313a58e74e40a562933c1556f2b5',
                redirectUri: 'https://eai-by-ermak.github.io/oauth-callback/'
            }
        };

        // ============================================================
        //  DOM
        // ============================================================
        const authStatus = document.getElementById('authStatus');
        const tokenRow = document.getElementById('tokenRow');
        const googleStatus = document.getElementById('googleStatus');
        const yandexUserData = document.getElementById('yandexUserData');
        const fileStatus = document.getElementById('fileStatus');
        const createFileBtn = document.getElementById('createFileBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        // Браузер
        const browserOverlay = document.getElementById('browserOverlay');
        const browserIframe = document.getElementById('browserIframe');
        const browserCloseBtn = document.getElementById('browserCloseBtn');
        const browserTitle = document.getElementById('browserTitle');

        // ============================================================
        //  ВКЛАДКИ
        // ============================================================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            });
        });

        // ============================================================
        //  УТИЛИТЫ
        // ============================================================
        function log(msg, type = 'info') {
            const el = document.getElementById('fileStatus');
            el.className = `status ${type}`;
            el.textContent = msg;
        }

        function getToken(provider) {
            const key = provider === 'google' ? 'google_token' : 'yandex_token';
            return localStorage.getItem(key);
        }

        function getUser(provider) {
            const key = provider === 'google' ? 'google_user' : 'yandex_user';
            try { return JSON.parse(localStorage.getItem(key) || '{}'); } catch { return {}; }
        }

        function getActiveProviders() {
            const providers = [];
            if (getToken('google')) providers.push('google');
            if (getToken('yandex')) providers.push('yandex');
            return providers;
        }

        // ============================================================
        //  ОТОБРАЖЕНИЕ ДАННЫХ
        // ============================================================
        function renderYandexData() {
            const user = getUser('yandex');
            if (!user || Object.keys(user).length === 0) {
                yandexUserData.innerHTML = '<div style="color:rgba(255,255,255,0.4);">Нет данных. Войдите через Яндекс.</div>';
                return;
            }

            const fields = {
                'Отображаемое имя': user.display_name || '—',
                'Реальное имя': user.real_name || '—',
                'Имя': user.first_name || '—',
                'Фамилия': user.last_name || '—',
                'Email': user.default_email || '—',
                'Пол': user.sex === 'male' ? 'Мужской' : user.sex === 'female' ? 'Женский' : user.sex || '—',
                'Дата рождения': user.birthday || '—',
                'Телефон': user.default_phone || '—',
                'Страна': user.country || '—',
                'Город': user.city || '—',
                'Аватар': user.default_avatar_id ? '✅ Есть' : '—',
                'Login': user.login || '—'
            };

            let html = '<div class="data-grid">';
            for (const [label, value] of Object.entries(fields)) {
                html += `<div class="label">${label}</div><div class="value">${value}</div>`;
            }
            html += '</div>';

            html += `<details style="margin-top:12px;">
                <summary style="color:rgba(255,255,255,0.3); font-size:12px; cursor:pointer;">📦 Сырые данные</summary>
                <pre style="background:rgba(0,0,0,0.3); padding:8px; border-radius:8px; font-size:11px; overflow-x:auto; margin-top:8px; color:rgba(255,255,255,0.6);">${JSON.stringify(user, null, 2)}</pre>
            </details>`;

            yandexUserData.innerHTML = html;
        }

        // ============================================================
        //  ОТОБРАЖЕНИЕ СТАТУСА
        // ============================================================
        function updateAuthStatus() {
            const providers = getActiveProviders();

            if (providers.length === 0) {
                authStatus.innerHTML = `<span class="badge none">Нет авторизации</span>`;
            } else {
                authStatus.innerHTML = providers.map(p =>
                    `<span class="badge ${p}">${p === 'google' ? 'Google' : 'Яндекс'}</span>`
                ).join(' ');
            }

            tokenRow.innerHTML = `
                <div class="token-chip ${getToken('google') ? 'active' : 'inactive'}">
                    <span class="label">Google:</span>
                    <span class="value">${getToken('google') ? '✅ есть' : '❌ нет'}</span>
                </div>
                <div class="token-chip ${getToken('yandex') ? 'active' : 'inactive'}">
                    <span class="label">Яндекс:</span>
                    <span class="value">${getToken('yandex') ? '✅ есть' : '❌ нет'}</span>
                </div>
            `;

            googleStatus.textContent = getToken('google') ? '✅ Токен есть' : '❌ Нет токена';
            googleStatus.style.color = getToken('google') ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.4)';

            renderYandexData();
        }

        // ============================================================
        //  ВХОД ЧЕРЕЗ ВСТРОЕННЫЙ БРАУЗЕР
        // ============================================================
        function openAuthInIframe(url, title) {
            browserTitle.textContent = title || 'Авторизация';
            browserIframe.src = url;
            browserOverlay.classList.add('active');
        }

        function closeBrowser() {
            browserOverlay.classList.remove('active');
            browserIframe.src = '';
        }

        function loginGoogle() {
            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
                `client_id=${CONFIG.google.clientId}` +
                `&redirect_uri=${CONFIG.google.redirectUri}` +
                `&response_type=token` +
                `&scope=https://www.googleapis.com/auth/drive.file`;
            openAuthInIframe(authUrl, 'Вход через Google');
        }

        function loginYandex() {
            const authUrl = `https://oauth.yandex.ru/authorize?` +
                `client_id=${CONFIG.yandex.clientId}` +
                `&response_type=code` +
                `&redirect_uri=${CONFIG.yandex.redirectUri}` +
                `&force_confirm=true`;
            openAuthInIframe(authUrl, 'Вход через Яндекс');
        }

        // ============================================================
        //  СОЗДАНИЕ ФАЙЛА В GOOGLE DRIVE
        // ============================================================
        function createFileInDrive() {
            const token = getToken('google');
            if (!token) {
                log('❌ Нет Google-токена.', 'error');
                return;
            }

            const fileName = document.getElementById('fileName').value.trim();
            const content = document.getElementById('fileContent').value;

            if (!fileName) {
                log('❌ Введите имя файла', 'error');
                return;
            }

            log('⏳ Создаём файл...', 'info');

            fetch('https://www.googleapis.com/drive/v3/files?q=name="Ermak X" and mimeType="application/vnd.google-apps.folder" and trashed=false', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                })
                .then(data => {
                    let folderId = null;
                    if (data.files && data.files.length > 0) {
                        folderId = data.files[0].id;
                        log('✅ Папка Ermak X найдена', 'success');
                        return folderId;
                    } else {
                        return fetch('https://www.googleapis.com/drive/v3/files', {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                name: 'Ermak X',
                                mimeType: 'application/vnd.google-apps.folder'
                            })
                        })
                            .then(res => res.json())
                            .then(folderData => {
                                if (folderData.error) throw new Error(folderData.error.message);
                                folderId = folderData.id;
                                log('✅ Папка Ermak X создана', 'success');
                                return folderId;
                            });
                    }
                })
                .then(folderId => {
                    if (!folderId) {
                        log('❌ Не удалось создать папку', 'error');
                        return;
                    }

                    log('⏳ Создаём файл...', 'info');
                    return fetch('https://www.googleapis.com/drive/v3/files', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            name: fileName,
                            parents: [folderId]
                        })
                    })
                        .then(res => res.json())
                        .then(fileData => {
                            if (fileData.error) throw new Error(fileData.error.message);
                            const fileId = fileData.id;
                            return fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
                                method: 'PATCH',
                                headers: {
                                    'Authorization': `Bearer ${token}`,
                                    'Content-Type': 'text/plain'
                                },
                                body: content
                            });
                        });
                })
                .then(() => {
                    log(`✅ Файл "${fileName}" создан!`, 'success');
                })
                .catch(err => {
                    log(`❌ Ошибка: ${err.message}`, 'error');
                });
        }

        // ============================================================
        //  ВЫХОД
        // ============================================================
        function logoutAll() {
            localStorage.removeItem('google_token');
            localStorage.removeItem('google_user');
            localStorage.removeItem('yandex_token');
            localStorage.removeItem('yandex_user');
            updateAuthStatus();
            log('👋 Вы вышли из всех аккаунтов', 'info');
        }

        // ============================================================
        //  ПРОВЕРКА ВОЗВРАТА С АВТОРИЗАЦИИ
        // ============================================================
        function checkCallback() {
            const params = new URLSearchParams(window.location.search);
            const tokenFromUrl = params.get('token');
            const code = params.get('code');

            // Google токен из URL
            if (tokenFromUrl) {
                localStorage.setItem('google_token', tokenFromUrl);
                window.history.replaceState(null, null, window.location.pathname);
                updateAuthStatus();
                log('✅ Google токен получен!', 'success');
                return;
            }

            // Яндекс: обмен кода на токен
            if (code) {
                fetch('https://oauth.yandex.ru/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: code,
                        client_id: CONFIG.yandex.clientId,
                        client_secret: 'd74265a56cbe4362a0e200a60fb5588a',
                        redirect_uri: CONFIG.yandex.redirectUri
                    })
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.access_token) {
                            localStorage.setItem('yandex_token', data.access_token);
                            return fetch('https://login.yandex.ru/info?format=json', {
                                headers: { 'Authorization': `OAuth ${data.access_token}` }
                            });
                        }
                        throw new Error('Ошибка получения токена');
                    })
                    .then(res => res.json())
                    .then(user => {
                        localStorage.setItem('yandex_user', JSON.stringify(user));
                        window.history.replaceState(null, null, window.location.pathname);
                        updateAuthStatus();
                        log('✅ Яндекс токен и данные получены!', 'success');
                    })
                    .catch(err => {
                        log('❌ Ошибка: ' + err.message, 'error');
                    });
            }
        }

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        document.getElementById('loginGoogleBtn').addEventListener('click', loginGoogle);
        document.getElementById('loginYandexBtn').addEventListener('click', loginYandex);
        createFileBtn.addEventListener('click', createFileInDrive);
        refreshBtn.addEventListener('click', updateAuthStatus);
        logoutBtn.addEventListener('click', logoutAll);

        browserCloseBtn.addEventListener('click', closeBrowser);
        browserOverlay.addEventListener('click', function(e) {
            if (e.target === this) closeBrowser();
        });

        updateAuthStatus();
        checkCallback();

        window.addEventListener('focus', function() {
            checkCallback();
            updateAuthStatus();
        });

        console.log('🧪 Тестовый HTML загружен');
        console.log('Google токен:', localStorage.getItem('google_token'));
        console.log('Яндекс токен:', localStorage.getItem('yandex_token'));
    </script>
</body>
</html>
