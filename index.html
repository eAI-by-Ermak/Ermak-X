<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Яндекс.Диск загрузчик</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0b0e1a;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.02);
            max-width: 600px;
            width: 100%;
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(0, 174, 0, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #e8edf5;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 174, 0, 0.1);
            padding-bottom: 15px;
            font-size: 24px;
        }
        h1 span { color: #00AE00; }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            font-size: 14px;
            color: #e8edf5;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        input[type="text"]:focus,
        textarea:focus {
            border-color: rgba(0, 174, 0, 0.3);
            outline: none;
        }
        textarea {
            height: 150px;
            resize: vertical;
            font-family: 'Courier New', monospace;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 8px;
        }
        .btn:hover { transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3); }
        .btn-primary { background: #00AE00;
            color: white; }
        .btn-primary:hover { background: #00cc00; }
        .btn-secondary { background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }
        .btn-danger { background: #e74c3c;
            color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #2ecc71;
            color: white; }
        .btn-success:hover { background: #27ae60; }
        .btn-warning { background: #f39c12;
            color: white; }
        .btn-warning:hover { background: #e67e22; }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
        }
        .status.success { display: block;
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.1); }
        .status.error { display: block;
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.1); }
        .status.info { display: block;
            background: rgba(52, 152, 219, 0.1);
            color: #3498db;
            border: 1px solid rgba(52, 152, 219, 0.1); }
        .token-status {
            padding: 12px 16px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.4);
        }
        .token-status .ok { color: #2ecc71; }
        .token-status .no { color: #e74c3c; }
        .path-preview {
            background: rgba(255, 255, 255, 0.02);
            padding: 10px 14px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            margin-top: 8px;
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .loading {
            display: none;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.3);
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top: 2px solid #00AE00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.05);
            font-size: 11px;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            padding-top: 20px;
        }
        .login-hint {
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            margin-top: 5px;
        }
        .login-hint a {
            color: #00AE00;
            text-decoration: none;
        }
        .login-hint a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 Яндекс.<span>Диск</span></h1>

        <div id="tokenStatus" class="token-status">
            <span id="tokenMessage">⏳ Проверка токена...</span>
        </div>

        <div class="button-group">
            <button id="authBtn" class="btn btn-warning">🔐 Авторизоваться</button>
            <button id="checkTokenBtn" class="btn btn-secondary">🔄 Проверить токен</button>
            <button id="clearTokenBtn" class="btn btn-danger">🗑️ Очистить токен</button>
        </div>

        <div class="login-hint">
            После авторизации скопируйте <strong>access_token</strong> из адресной строки и вставьте в поле ниже.
        </div>

        <div class="form-group">
            <label>🔑 Вставить токен</label>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="text" id="tokenInput" placeholder="Вставьте access_token..." style="flex:1; min-width: 200px; font-family: monospace; font-size: 12px;">
                <button id="saveTokenBtn" class="btn btn-success">💾 Сохранить</button>
            </div>
        </div>

        <div class="form-group">
            <label for="filename">📄 Имя файла</label>
            <input type="text" id="filename" value="my_note.txt" placeholder="example.txt">
        </div>

        <div class="form-group">
            <label for="folderPath">📂 Путь на Диске (опционально)</label>
            <input type="text" id="folderPath" placeholder="Documents/ или оставьте пустым">
            <div class="path-preview">📍 <span id="fullPath">app:/my_note.txt</span></div>
        </div>

        <div class="form-group">
            <label for="content">✏️ Содержимое</label>
            <textarea id="content">Привет! Это тестовый файл.
Загружен через Google Apps Script посредник.
Работает в WebView и любом браузере! 🚀</textarea>
        </div>

        <div class="button-group">
            <button id="uploadBtn" class="btn btn-primary">📤 Загрузить</button>
            <button id="listBtn" class="btn btn-secondary">📂 Список файлов</button>
            <button id="deleteBtn" class="btn btn-danger">🗑️ Удалить файл</button>
            <span class="loading" id="loader"><span class="spinner"></span> Загрузка...</span>
        </div>

        <div id="statusMessage" class="status"></div>
        <div class="footer">Работает через Google Apps Script</div>
    </div>

    <script>
        // ============ ССЫЛКА НА СКРИПТ ============
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw1Zt4AMxukbOKOT6TpQtvchw6LpA0mklVy2f4ov2x1NfrZVnVQoyM5uKNWjZVNTm5w/exec';

        // ============ DOM ЭЛЕМЕНТЫ ============
        const tokenStatus = document.getElementById('tokenStatus');
        const tokenMessage = document.getElementById('tokenMessage');
        const tokenInput = document.getElementById('tokenInput');
        const saveTokenBtn = document.getElementById('saveTokenBtn');
        const authBtn = document.getElementById('authBtn');
        const checkTokenBtn = document.getElementById('checkTokenBtn');
        const clearTokenBtn = document.getElementById('clearTokenBtn');
        const filenameInput = document.getElementById('filename');
        const folderPathInput = document.getElementById('folderPath');
        const contentTextarea = document.getElementById('content');
        const fullPathSpan = document.getElementById('fullPath');
        const uploadBtn = document.getElementById('uploadBtn');
        const listBtn = document.getElementById('listBtn');
        const deleteBtn = document.getElementById('deleteBtn');
        const statusDiv = document.getElementById('statusMessage');
        const loader = document.getElementById('loader');

        let accessToken = localStorage.getItem('yandex_token') || null;

        // ============ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ============

        function showStatus(message, type = 'info') {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
        }

        function hideStatus() {
            statusDiv.style.display = 'none';
        }

        function setLoading(loading) {
            loader.style.display = loading ? 'flex' : 'none';
            uploadBtn.disabled = loading;
            listBtn.disabled = loading;
            deleteBtn.disabled = loading;
        }

        function updatePath() {
            const folder = folderPathInput.value.trim();
            const filename = filenameInput.value.trim() || 'untitled.txt';
            const path = folder ? `app:/${folder.replace(/^\/+/, '').replace(/\/+$/, '')}/${filename}` : `app:/${filename}`;
            fullPathSpan.textContent = path;
        }

        function updateUI() {
            if (accessToken) {
                tokenStatus.innerHTML = `<span class="ok">✅ Токен активен (${accessToken.substring(0, 20)}...)</span>`;
                tokenInput.value = accessToken;
                uploadBtn.disabled = false;
                listBtn.disabled = false;
                deleteBtn.disabled = false;
            } else {
                tokenStatus.innerHTML = `<span class="no">❌ Токен не установлен</span>`;
                tokenInput.value = '';
                uploadBtn.disabled = true;
                listBtn.disabled = true;
                deleteBtn.disabled = true;
            }
        }

        // ============ РАБОТА С ТОКЕНОМ ============

        function saveToken() {
            const token = tokenInput.value.trim();
            if (!token || token.length < 10) {
                showStatus('⚠️ Введите корректный токен', 'error');
                return;
            }
            accessToken = token;
            localStorage.setItem('yandex_token', accessToken);
            updateUI();
            showStatus('✅ Токен сохранён!', 'success');
            setTimeout(hideStatus, 2000);
        }

        function clearToken() {
            accessToken = null;
            localStorage.removeItem('yandex_token');
            updateUI();
            showStatus('🗑️ Токен очищен', 'info');
            setTimeout(hideStatus, 2000);
        }

        function getAuthUrl() {
            const clientId = '834edc54f2be4ea0ae277ac3013d2e91';
            const url =
                `https://oauth.yandex.com/authorize?response_type=token&client_id=${clientId}`;
            window.open(url, '_blank', 'width=600,height=700');
            showStatus('🔐 Открыто окно авторизации. После получения токена вставьте его в поле выше.', 'info');
        }

        // ============ ЗАПРОСЫ К СКРИПТУ (GET + no-cors) ============

        async function callScript(action, params = {}) {
            if (!accessToken) throw new Error('Токен не установлен');

            const url = new URL(SCRIPT_URL);
            url.searchParams.append('action', action);
            url.searchParams.append('token', accessToken);
            
            for (const key in params) {
                url.searchParams.append(key, params[key]);
            }

            // GET + no-cors — обход CORS
            await fetch(url.toString(), {
                method: 'GET',
                mode: 'no-cors',
                headers: {
                    'Accept': 'application/json'
                }
            });

            return { success: true };
        }

        // ============ ДЕЙСТВИЯ ============

        async function uploadFile() {
            const filename = filenameInput.value.trim() || 'untitled.txt';
            const folder = folderPathInput.value.trim();
            const content = contentTextarea.value;

            if (!content) {
                showStatus('⚠️ Введите содержимое', 'error');
                return;
            }

            setLoading(true);
            hideStatus();

            try {
                await callScript('upload', {
                    filename: filename,
                    content: content,
                    folder: folder
                });
                showStatus(`✅ Файл "${filename}" отправлен на загрузку!`, 'success');
            } catch (error) {
                showStatus(`❌ Ошибка: ${error.message}`, 'error');
            } finally {
                setLoading(false);
                setTimeout(hideStatus, 5000);
            }
        }

        async function listFiles() {
            setLoading(true);
            hideStatus();

            try {
                const folder = folderPathInput.value.trim();
                await callScript('list', { folder: folder });
                showStatus('📂 Запрос списка файлов отправлен', 'info');
            } catch (error) {
                showStatus(`❌ Ошибка: ${error.message}`, 'error');
            } finally {
                setLoading(false);
                setTimeout(hideStatus, 3000);
            }
        }

        async function deleteFile() {
            const filename = filenameInput.value.trim();
            if (!filename) {
                showStatus('⚠️ Укажите имя файла для удаления', 'error');
                return;
            }

            if (!confirm(`Удалить файл "${filename}"?`)) return;

            setLoading(true);
            hideStatus();

            try {
                const folder = folderPathInput.value.trim();
                await callScript('delete', {
                    filename: filename,
                    folder: folder
                });
                showStatus(`✅ Файл "${filename}" отправлен на удаление`, 'success');
            } catch (error) {
                showStatus(`❌ Ошибка: ${error.message}`, 'error');
            } finally {
                setLoading(false);
                setTimeout(hideStatus, 5000);
            }
        }

        // ============ ОБРАБОТЧИКИ ============

        saveTokenBtn.addEventListener('click', saveToken);
        authBtn.addEventListener('click', getAuthUrl);
        checkTokenBtn.addEventListener('click', () => {
            if (accessToken) {
                showStatus('✅ Токен сохранён в localStorage', 'success');
            } else {
                showStatus('❌ Токен не установлен', 'error');
            }
        });
        clearTokenBtn.addEventListener('click', clearToken);
        uploadBtn.addEventListener('click', uploadFile);
        listBtn.addEventListener('click', listFiles);
        deleteBtn.addEventListener('click', deleteFile);
        filenameInput.addEventListener('input', updatePath);
        folderPathInput.addEventListener('input', updatePath);
        tokenInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveToken();
        });

        // ============ ИНИЦИАЛИЗАЦИЯ ============

        updateUI();
        updatePath();

        console.log('🚀 Приложение готово (no-cors)');
        console.log('📌 SCRIPT_URL:', SCRIPT_URL);
        console.log('🔑 Токен:', accessToken ? '✅ установлен' : '❌ не установлен');
    </script>
</body>
</html>
