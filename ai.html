<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>AI Ассистент</title>
    <style>
        html {
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: background-color 0.2s, color 0.2s;
            overflow: hidden;
        }
        body.theme-light {
            --bg-color: #f5f5f7;
            --text-color: #1c1c1e;
            --ai-msg-bg: rgba(0, 0, 0, 0.05);
            --user-msg-start: #007aff;
            --user-msg-end: #5856d6;
            --border-color: rgba(0, 0, 0, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.7);
        }
        body.theme-dark {
            --bg-color: #000000;
            --text-color: #ffffff;
            --ai-msg-bg: rgba(255, 255, 255, 0.1);
            --user-msg-start: #0a84ff;
            --user-msg-end: #5e5ce0;
            --border-color: rgba(255, 255, 255, 0.25);
            --glass-bg: rgba(30, 30, 35, 0.7);
        }

        /* ===== МЕДЛЕННАЯ КРУГОВАЯ АНИМАЦИЯ КОНТУРА ===== */
        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes borderSpin {
            0% { --angle: 0deg; }
            100% { --angle: 360deg; }
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 12px 12px 8px 12px;
            position: relative;
        }

        .close-red {
            position: fixed;
            top: 16px;
            left: 16px;
            width: 14px;
            height: 14px;
            background: #ff5f5a;
            border-radius: 50%;
            z-index: 1000;
            cursor: pointer;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
        }

        /* Агент селектор - НЕ сдвигает контент */
        .agent-selector {
            position: relative;
            margin: 20px auto 8px auto;
            width: fit-content;
            max-width: 80%;
            text-align: center;
            z-index: 100;
            flex-shrink: 0;
        }

        .agent-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }

        .agent-btn::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 42px;
            padding: 2px;
            background: conic-gradient(
                from var(--angle, 0deg),
                transparent 0%,
                #7b2ffc 12%,
                #a855f7 25%,
                #c084fc 35%,
                #a855f7 45%,
                #7b2ffc 55%,
                transparent 70%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderSpin 6s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .agent-btn > * {
            position: relative;
            z-index: 1;
        }

        .agent-btn:active { transform: scale(0.97); }

        /* Выпадающий список - ПОЗИЦИЯ ABSOLUTE, НЕ сдвигает контент */
        .agent-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 8px 0;
            min-width: 200px;
            display: none;
            flex-direction: column;
            z-index: 200;
            position: absolute;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .agent-dropdown::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            padding: 2px;
            background: conic-gradient(
                from var(--angle, 0deg),
                transparent 0%,
                #7b2ffc 12%,
                #a855f7 25%,
                #c084fc 35%,
                #a855f7 45%,
                #7b2ffc 55%,
                transparent 70%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderSpin 6s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .agent-dropdown > * {
            position: relative;
            z-index: 1;
        }

        .agent-dropdown.show { display: flex; }

        .agent-option {
            padding: 12px 20px;
            font-size: 14px;
            color: var(--text-color);
            cursor: pointer;
            text-align: center;
            border-radius: 12px;
            margin: 2px 6px;
            transition: background 0.1s;
        }
        .agent-option:active { background: rgba(255,255,255,0.15); }

        /* Чат область - растягивается на всё свободное место */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 12px 0;
            padding: 4px;
            min-height: 0;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 16px;
            line-height: 1.4;
            word-break: break-word;
        }

        .message-user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--user-msg-start), var(--user-msg-end));
            color: white;
            border-bottom-right-radius: 6px;
        }

        /* Сообщения ИИ - БЕЗ ОБВОДКИ */
        .message-ai {
            align-self: flex-start;
            background: var(--ai-msg-bg);
            color: var(--text-color);
            border-bottom-left-radius: 6px;
            position: relative;
            border: none;
        }

        .copy-btn {
            position: absolute;
            bottom: 6px;
            right: 8px;
            background: none;
            border: none;
            font-size: 14px;
            opacity: 0.6;
            cursor: pointer;
            color: inherit;
            padding: 4px;
            border-radius: 12px;
        }
        .copy-btn:active { opacity: 1; background: rgba(255,255,255,0.2); }

        /* Поле ввода с обводкой */
        .input-wrapper {
            display: flex;
            align-items: flex-end;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 8px 12px;
            gap: 8px;
            margin-top: 4px;
            position: relative;
            flex-shrink: 0;
        }

        .input-wrapper::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 34px;
            padding: 2px;
            background: conic-gradient(
                from var(--angle, 0deg),
                transparent 0%,
                #7b2ffc 12%,
                #a855f7 25%,
                #c084fc 35%,
                #a855f7 45%,
                #7b2ffc 55%,
                transparent 70%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderSpin 6s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .input-wrapper > * {
            position: relative;
            z-index: 1;
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 16px;
            color: var(--text-color);
            outline: none;
            resize: none;
            font-family: inherit;
            max-height: 100px;
            padding: 8px 0;
            user-select: text;
            -webkit-user-select: text;
        }

        .send-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-color);
            opacity: 0.7;
            padding: 4px 8px;
        }
        .send-btn:active { transform: scale(0.9); }

        .copyright {
            text-align: center;
            font-size: 10px;
            color: rgba(128,128,128,0.6);
            margin-top: 6px;
            pointer-events: none;
            flex-shrink: 0;
        }

        a { color: var(--user-msg-start); text-decoration: none; }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 3000;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="close-red" id="closeBtn"></div>

        <div class="agent-selector">
            <button class="agent-btn" id="agentBtn">
                <span>🤖</span> <span id="selectedAgentName">Загрузка...</span> <span>▼</span>
            </button>
            <div class="agent-dropdown" id="agentDropdown"></div>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="input-wrapper">
            <textarea id="messageInput" class="message-input" rows="1" placeholder="Сообщение..."></textarea>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>

        <div class="copyright">© ErmakArtekovec</div>
    </div>

    <script src="cordova.js"></script>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxS2kuAR3DBA099NNW7geQxxRwTuIid4g_4RAO3LcXGPrF-Fzqau3WPPWpwUJTvIgJJ/exec';
        const SECRET = 'eG3n1us2025';

        let agents = [];
        let selectedAgentIndex = 0;
        let aiCorePrompt = '';
        let chatHistory = [];
        let isWaiting = false;
        let contextCount = 5;
        let typingSoundEnabled = true;
        let currentVolume = 100;

        let typingAudio = null;
        let audioLoaded = false;

        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const agentBtn = document.getElementById('agentBtn');
        const agentDropdown = document.getElementById('agentDropdown');
        const selectedAgentNameSpan = document.getElementById('selectedAgentName');
        const closeBtn = document.getElementById('closeBtn');

        function initAudio() {
            if (audioLoaded) return;
            try {
                typingAudio = new Audio('typing.mp3');
                typingAudio.load();
                typingAudio.volume = currentVolume / 100;
                audioLoaded = true;
                console.log('Audio loaded successfully');
            } catch(e) {
                console.log('Audio init failed:', e);
                document.addEventListener('touchstart', function retry() {
                    if (!audioLoaded) {
                        typingAudio = new Audio('typing.mp3');
                        typingAudio.load();
                        typingAudio.volume = currentVolume / 100;
                        audioLoaded = true;
                        console.log('Audio loaded on touch');
                    }
                    document.removeEventListener('touchstart', retry);
                });
            }
        }

        function updateVolume() {
            if (typingAudio) {
                typingAudio.volume = currentVolume / 100;
            }
        }

        function playTypingSound() {
            if (!typingSoundEnabled || !audioLoaded || !typingAudio) {
                if (!audioLoaded) initAudio();
                return;
            }
            try {
                typingAudio.currentTime = 0;
                const playPromise = typingAudio.play();
                if (playPromise) {
                    playPromise.catch(() => {});
                }
            } catch(e) {}
        }

        function loadAppSettings() {
            const saved = localStorage.getItem('ermakx_settings');
            if (saved) {
                try {
                    const s = JSON.parse(saved);
                    contextCount = s.context !== undefined ? s.context : 5;
                    typingSoundEnabled = s.typingSound !== undefined ? s.typingSound : true;
                    currentVolume = s.volume !== undefined ? s.volume : 100;
                    const theme = s.theme || 'system';
                    applyTheme(theme);
                } catch(e) {}
            } else {
                applyTheme('system');
            }
            updateVolume();
        }

        function applyTheme(theme) {
            let resolved = theme;
            if (theme === 'system') {
                resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.body.classList.remove('theme-light', 'theme-dark');
            document.body.classList.add(`theme-${resolved}`);
        }

        async function fetchDatabase() {
            try {
                const url = `${SCRIPT_URL}?action=getDatabase&secret=${SECRET}`;
                const response = await fetch(url);
                const data = await response.json();
                if (data.success && data.text) {
                    parseDatabase(data.text);
                    return true;
                }
                return false;
            } catch(e) {
                console.warn('Network error', e);
                return false;
            }
        }

        function parseDatabase(text) {
            const agentsMatch = text.match(/\[AI_Agents\]([\s\S]*?)(?=\[|$)/i);
            if (agentsMatch) {
                const block = agentsMatch[1].trim();
                const lines = block.split(/\r?\n/);
                const newAgents = [];
                for (let i = 0; i < lines.length; i++) {
                    let name = lines[i].trim();
                    if (!name || name.startsWith('[')) continue;
                    let model = lines[++i]?.trim() || '';
                    let key = lines[++i]?.trim() || '';
                    if (name && model && key) {
                        newAgents.push({ name, model, key });
                    }
                }
                if (newAgents.length) {
                    agents = newAgents;
                    localStorage.setItem('ermakx_agents', JSON.stringify(agents));
                }
            }
            const coreMatch = text.match(/\[aiCore\]([\s\S]*?)$/i);
            if (coreMatch) {
                aiCorePrompt = coreMatch[1].trim();
                localStorage.setItem('ermakx_aicore', aiCorePrompt);
            }
        }

        function loadCachedData() {
            const cachedAgents = localStorage.getItem('ermakx_agents');
            if (cachedAgents) agents = JSON.parse(cachedAgents);
            const cachedCore = localStorage.getItem('ermakx_aicore');
            if (cachedCore) aiCorePrompt = cachedCore;
            if (agents.length === 0) agents = [{ name: 'Базовый AI', model: 'nvidia/nemotron-3-super-120b-a12b:free', key: 'dummy' }];
            if (!aiCorePrompt) aiCorePrompt = 'Ты полезный AI ассистент.';
        }

        function renderAgentDropdown() {
            agentDropdown.innerHTML = '';
            agents.forEach((agent, idx) => {
                const div = document.createElement('div');
                div.className = 'agent-option';
                div.textContent = agent.name;
                div.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectedAgentIndex = idx;
                    selectedAgentNameSpan.textContent = agents[selectedAgentIndex].name;
                    localStorage.setItem('ermakx_selected_agent', selectedAgentIndex);
                    agentDropdown.classList.remove('show');
                });
                agentDropdown.appendChild(div);
            });
        }

        function initAgentSelector() {
            const savedIdx = localStorage.getItem('ermakx_selected_agent');
            if (savedIdx && agents[parseInt(savedIdx)]) selectedAgentIndex = parseInt(savedIdx);
            else selectedAgentIndex = 0;
            if (agents.length) selectedAgentNameSpan.textContent = agents[selectedAgentIndex].name;
            renderAgentDropdown();
            agentBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                agentDropdown.classList.toggle('show');
            });
            document.addEventListener('click', () => agentDropdown.classList.remove('show'));
        }

        function saveChat() { localStorage.setItem('ermakx_chat', JSON.stringify(chatHistory)); }
        function loadChat() {
            const saved = localStorage.getItem('ermakx_chat');
            chatHistory = saved ? JSON.parse(saved) : [];
            renderChat();
        }

        function renderChat() {
            chatArea.innerHTML = '';
            if (chatHistory.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'message message-ai';
                emptyDiv.textContent = '👋 Здравствуйте! Я AI ассистент. Чем могу помочь?';
                chatArea.appendChild(emptyDiv);
            } else {
                chatHistory.forEach(msg => {
                    if (msg.role === 'user') {
                        const div = document.createElement('div');
                        div.className = 'message message-user';
                        div.textContent = msg.content;
                        chatArea.appendChild(div);
                    } else {
                        const div = document.createElement('div');
                        div.className = 'message message-ai';
                        div.innerHTML = formatMessage(msg.content);
                        const copy = document.createElement('button');
                        copy.className = 'copy-btn';
                        copy.textContent = '📋';
                        copy.onclick = () => {
                            navigator.clipboard.writeText(msg.content);
                            showToast('Скопировано');
                        };
                        div.appendChild(copy);
                        chatArea.appendChild(div);
                    }
                });
            }
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function formatMessage(text) {
            const urlRegex = /(https?:\/\/[^\s]+|www\.[^\s]+)/g;
            return text.replace(urlRegex, url => `<a href="${url.startsWith('http') ? url : 'https://'+url}" target="_blank">${url}</a>`);
        }

        function showToast(msg) {
            let toast = document.querySelector('.toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.className = 'toast';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.style.opacity = '1';
            clearTimeout(toast._hideTimeout);
            toast._hideTimeout = setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }

        async function sendToAI(message) {
            const agent = agents[selectedAgentIndex];
            if (!agent || !agent.model || !agent.key || agent.key === 'dummy') {
                return "На сегодня я устал — попробуйте позже или смените агента.";
            }
            let contextMessages = [];
            if (contextCount > 0 && chatHistory.length) {
                contextMessages = chatHistory.slice(-contextCount).map(m => ({
                    role: m.role === 'user' ? 'user' : 'assistant',
                    content: m.content
                }));
            }
            const messages = [
                { role: 'system', content: aiCorePrompt },
                ...contextMessages,
                { role: 'user', content: message }
            ];
            try {
                const resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${agent.key}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ model: agent.model, messages })
                });
                const data = await resp.json();
                if (data.choices && data.choices[0]) return data.choices[0].message.content;
                else return "На сегодня я устал — попробуйте позже или смените агента.";
            } catch(e) {
                return "На сегодня я устал — попробуйте позже или смените агента.";
            }
        }

        async function sendMessage() {
            if (isWaiting) { showToast('Уже отвечаю...'); return; }
            const text = messageInput.value.trim();
            if (!text) return;

            playTypingSound();

            messageInput.value = '';
            messageInput.style.height = 'auto';
            chatHistory.push({ role: 'user', content: text });
            saveChat();
            renderChat();
            isWaiting = true;
            const typingId = Date.now();
            chatHistory.push({ role: 'ai', content: '...', isTyping: true, id: typingId });
            renderChat();
            const aiResponse = await sendToAI(text);
            const idx = chatHistory.findIndex(m => m.id === typingId);
            if (idx !== -1) chatHistory.splice(idx, 1);
            chatHistory.push({ role: 'ai', content: aiResponse });
            saveChat();
            renderChat();
            isWaiting = false;
        }

        async function init() {
            loadAppSettings();
            initAudio();
            loadCachedData();
            await fetchDatabase();
            loadCachedData();
            initAgentSelector();
            loadChat();

            sendBtn.addEventListener('click', () => sendMessage());

            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 100) + 'px';
                playTypingSound();
            });

            closeBtn.addEventListener('click', () => {
                window.location.href = 'index.html';
            });

            document.addEventListener('touchstart', function initOnTouch() {
                if (!audioLoaded) initAudio();
                document.removeEventListener('touchstart', initOnTouch);
            });
        }

        init();
    </script>
</body>
</html>
